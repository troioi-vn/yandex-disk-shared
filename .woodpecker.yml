when:
  - event: [push, manual]

labels:
  hostname: a84032fdfe6e

steps:
  verify_deploy_files:
    image: alpine:3.22
    commands:
      - 'test -f Dockerfile'
      - 'test -f docker-compose.yml'
      - 'test -f docker-entrypoint.sh'
      - 'test -f .env.example'
      - "grep -q 'YANDEX_HOST_CONFIG_DIR' .env.example"
      - "grep -q 'YANDEX_CONFIG_FILE: /config/config.cfg' docker-compose.yml"
      - "grep -q 'config/' .gitignore"

  deploy_yandex_disk_shared:
    image: alpine:3.22
    environment:
      CATARCHY2_HOST:
        from_secret: CATARCHY2_HOST
      CATARCHY2_USER:
        from_secret: CATARCHY2_USER
      CATARCHY2_SSH_KEY:
        from_secret: CATARCHY2_SSH_KEY
    commands:
      - 'apk add --no-cache openssh-client'
      - 'test -n "$${CATARCHY2_HOST}"'
      - 'test -n "$${CATARCHY2_USER}"'
      - 'test -n "$${CATARCHY2_SSH_KEY}"'
      - |
        umask 077
        mkdir -p "$$HOME/.ssh"
        chmod 700 "$$HOME/.ssh"
        key_input="$${CATARCHY2_SSH_KEY}"
        key_ok=0
        printf '%s\n' "$$key_input" | tr -d '\r' > "$$HOME/.ssh/id_ed25519"
        chmod 600 "$$HOME/.ssh/id_ed25519"
        if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
          key_ok=1
        fi
        if [ "$$key_ok" -ne 1 ]; then
          printf '%b' "$$key_input" | tr -d '\r' > "$$HOME/.ssh/id_ed25519"
          chmod 600 "$$HOME/.ssh/id_ed25519"
          if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
            key_ok=1
          fi
        fi
        if [ "$$key_ok" -ne 1 ]; then
          if printf '%s' "$$key_input" | tr -d '\r\n\t ' | tr -cd 'A-Za-z0-9+/=' | base64 -d > "$$HOME/.ssh/id_ed25519" 2>/dev/null; then
            chmod 600 "$$HOME/.ssh/id_ed25519"
            if ssh-keygen -y -f "$$HOME/.ssh/id_ed25519" >/dev/null 2>&1; then
              key_ok=1
            fi
          fi
        fi
        if [ "$$key_ok" -ne 1 ]; then
          echo "CATARCHY2_SSH_KEY is not a valid OpenSSH private key in raw, escaped, or base64 form."
          exit 1
        fi
        ssh-keyscan -H "$${CATARCHY2_HOST}" >> "$$HOME/.ssh/known_hosts"
      - |
        printf '%s\n' \
          'YANDEX_CONTAINER_NAME=yandex-disk-shared' \
          'YANDEX_UID=1000' \
          'YANDEX_GID=1000' \
          'YANDEX_HOST_CONFIG_DIR=/opt/yandex-disk-shared/config' \
          'YANDEX_HOST_DATA_DIR=/opt/yandex-disk-shared/data' \
          'YANDEX_PROXY=' \
          'YANDEX_EXCLUDE_DIRS=' \
          'YANDEX_READ_ONLY=false' \
          'YANDEX_OVERWRITE=false' \
          > .env.deploy
      - 'scp Dockerfile "$${CATARCHY2_USER}@$${CATARCHY2_HOST}:/tmp/yandex-disk-shared-Dockerfile"'
      - 'scp docker-compose.yml "$${CATARCHY2_USER}@$${CATARCHY2_HOST}:/tmp/yandex-disk-shared-docker-compose.yml"'
      - 'scp docker-entrypoint.sh "$${CATARCHY2_USER}@$${CATARCHY2_HOST}:/tmp/yandex-disk-shared-entrypoint.sh"'
      - 'scp .env.deploy "$${CATARCHY2_USER}@$${CATARCHY2_HOST}:/tmp/yandex-disk-shared.env"'
      - |
        ssh "$${CATARCHY2_USER}@$${CATARCHY2_HOST}" '
          sudo -n mkdir -p /opt/yandex-disk-shared/config /opt/yandex-disk-shared/data &&
          sudo -n chown -R ubuntu:ubuntu /opt/yandex-disk-shared &&
          sudo -n mv /tmp/yandex-disk-shared-Dockerfile /opt/yandex-disk-shared/Dockerfile &&
          sudo -n mv /tmp/yandex-disk-shared-docker-compose.yml /opt/yandex-disk-shared/docker-compose.yml &&
          sudo -n mv /tmp/yandex-disk-shared-entrypoint.sh /opt/yandex-disk-shared/docker-entrypoint.sh &&
          sudo -n mv /tmp/yandex-disk-shared.env /opt/yandex-disk-shared/.env &&
          sudo -n chmod 600 /opt/yandex-disk-shared/.env &&
          sudo -n chmod 755 /opt/yandex-disk-shared/docker-entrypoint.sh &&
          cd /opt/yandex-disk-shared &&
          sudo -n docker compose --env-file /opt/yandex-disk-shared/.env build --pull &&
          sudo -n docker compose --env-file /opt/yandex-disk-shared/.env up -d &&
          timeout 120 sh -c "until sudo -n docker inspect -f {{.State.Running}} yandex-disk-shared 2>/dev/null | grep -q true; do sleep 3; done" &&
          sudo -n docker compose --env-file /opt/yandex-disk-shared/.env ps
        '
      - 'rm -f .env.deploy'
