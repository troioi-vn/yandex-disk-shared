name: yandex-disk-shared

services:
  yandex-disk:
    image: ${YANDEX_IMAGE:-yandex-disk-shared:local}
    build:
      context: .
    container_name: ${YANDEX_CONTAINER_NAME}
    env_file:
      - .env
    user: "${YANDEX_UID}:${YANDEX_GID}"
    restart: unless-stopped
    environment:
      HOME: /home/ubuntu
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      YANDEX_CONFIG_DIR: /config
      YANDEX_CONFIG_FILE: /config/config.cfg
      YANDEX_SYNC_DIR: /data
      YANDEX_AUTH_FILE: /config/passwd
      YANDEX_PROXY: ${YANDEX_PROXY}
      YANDEX_EXCLUDE_DIRS: ${YANDEX_EXCLUDE_DIRS}
      YANDEX_READ_ONLY: ${YANDEX_READ_ONLY}
      YANDEX_OVERWRITE: ${YANDEX_OVERWRITE}
    volumes:
      - ${YANDEX_HOST_CONFIG_DIR}:/config
      - ${YANDEX_HOST_CONFIG_DIR}:/home/ubuntu/.config/yandex-disk
      - ${YANDEX_HOST_DATA_DIR}:/data
      - /opt/shared-postgres/backups:/data/catarchy2_backup/shared-postgres-backups:ro
      - /opt/shared-mariadb/backups:/data/catarchy2_backup/shared-mariadb-backups:ro
      - /var/backups/catarchy2-restic-meta:/data/catarchy2_backup/catarchy2-restic-meta:ro
      - /var/log/catarchy2-restic-backup.log:/data/catarchy2_backup/catarchy2-restic-backup.log:ro
